name: BuZzbot Portable Windows build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Получить исходники
        uses: actions/checkout@v4

      - name: Установить Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Установить зависимости
        run: python -m pip install -r requirements.txt

      - name: Запустить тесты
        run: python -m unittest discover -s tests -v

      - name: Собрать portable-версию
        shell: pwsh
        run: |
          Copy-Item config.example.json config.json
          python tools/install_training_profile.py `
            --profile profiles/BuZzbot_PC_1280x720.zip `
            --install-root .
          python build_portable.py --clean-runtime
          Remove-Item dist/BuZzbotPortable.zip -Force
          Compress-Archive `
            -Path dist/BuZzbotPortable `
            -DestinationPath dist/BuZzbotPortable.zip `
            -CompressionLevel Optimal

      - name: Проверить запуск EXE
        shell: pwsh
        run: |
          $process = Start-Process dist/BuZzbotPortable/BuZzbot.exe -PassThru
          try {
            Start-Sleep -Seconds 10
            $process.Refresh()
            if ($process.HasExited) {
              throw "Portable EXE завершился при запуске."
            }
            if ($process.MainWindowTitle -like "*Unhandled exception*") {
              throw "Portable EXE открыл окно необработанной ошибки."
            }
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id
            }
          }

      - name: Сохранить ZIP сборки
        uses: actions/upload-artifact@v4
        with:
          name: BuZzbotPortable
          path: dist/BuZzbotPortable.zip
          if-no-files-found: error

      - name: Обновить релиз latest
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force
          gh release view latest *> $null
          if ($LASTEXITCODE -eq 0) {
            $assets = gh release view latest --json assets --jq '.assets[].name'
            foreach ($asset in $assets) {
              if ($asset -ne 'BuZzbotPortable.zip') {
                gh release delete-asset latest $asset --yes
              }
            }
            gh release upload latest dist/BuZzbotPortable.zip --clobber
            gh release edit latest --title "BuZzbot — последняя portable-сборка" --notes "Автоматическая сборка BuZzbot из ветки main."
          } else {
            gh release create latest dist/BuZzbotPortable.zip --title "BuZzbot — последняя portable-сборка" --notes "Автоматическая сборка BuZzbot из ветки main."
          }
